name: Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from mise.toml
        id: node
        run:
          echo "version=$(grep -E '^node\s*=' mise.toml | sed -E 's/.*"([^"]+)".*/\1/')" >>
          "$GITHUB_OUTPUT"

      - name: Install package manager (from package.json)
        run: |
          corepack enable
          corepack install

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}

      - name: Resolve yarn cache folder
        id: yarn-config
        run: echo "cacheFolder=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - name: Restore yarn install cache (node_modules + cacheFolder + install-state)
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ${{ steps.yarn-config.outputs.cacheFolder }}
            .yarn/install-state.gz
          key:
            yarn-${{ runner.os }}-node${{ steps.node.outputs.version }}-${{
            hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-node${{ steps.node.outputs.version }}-

      - name: Install deps
        env:
          YARN_ENABLE_HARDENED_MODE: 'false'
        run: |
          case "$(yarn --version)" in 1.*) echo 'expected up-to-date yarn version'; exit 1 ;; esac
          yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

  rust:
    name: Rust checks
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Read Node version from mise.toml
        id: node
        run:
          echo "version=$(grep -E '^node\s*=' mise.toml | sed -E 's/.*"([^"]+)".*/\1/')" >>
          "$GITHUB_OUTPUT"

      - name: Install package manager (from package.json)
        run: |
          corepack enable
          corepack install

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}

      - name: Resolve yarn cache folder
        id: yarn-config
        run: echo "cacheFolder=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - name: Restore yarn install cache (node_modules + cacheFolder + install-state)
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ${{ steps.yarn-config.outputs.cacheFolder }}
            .yarn/install-state.gz
          key:
            yarn-${{ runner.os }}-node${{ steps.node.outputs.version }}-${{
            hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-node${{ steps.node.outputs.version }}-

      - name: Install deps
        env:
          YARN_ENABLE_HARDENED_MODE: 'false'
        run: |
          case "$(yarn --version)" in 1.*) echo 'expected up-to-date yarn version'; exit 1 ;; esac
          yarn install --immutable

      - name: Format
        run: yarn rust:fmt

      - name: Clippy
        run: yarn rust:clippy

      - name: Check
        run: yarn rust:check
